<head>
  <meta charset="UTF-8">
  <title>Betting Effects</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    nav {
      text-align: center;
      margin-bottom: 10px;
    }
    nav a {
      color: #4da6ff;
      margin: 0 10px;
      text-decoration: none;
    }
  </style>
</head><body>
  <nav>
    <a href="index.html">Home</a>
    <a href="effects.html">Effects</a>
    <a href="help.html">Help</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" id="login-link">Login</a>
  </nav>
  
  <p id="welcome-msg" style="text-align:center; font-weight:bold; color:#00ff88; margin:10px 0;"></p>
  
  <img src="Banner.jpg" style="width:100%; max-width:600px; display:block; margin:20px auto;">
  
  <!-- Firebase script goes here at the bottom -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB-YLjE9x0AGDeHUK-gnUqDvW51sYnLkWg",
      authDomain: "betting-effects-edu.firebaseapp.com",
      projectId: "betting-effects-edu",
      storageBucket: "betting-effects-edu.firebasestorage.app",
      messagingSenderId: "100619149213",
      appId: "1:100619149213:web:1b9cda3df2cce2f262d974"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      const loginLink = document.getElementById('login-link');
      const welcomeMsg = document.getElementById('welcome-msg');
      
      if (user) {
        if (loginLink) {
          loginLink.innerText = 'Logout';
          loginLink.href = '#';
          loginLink.onclick = (e) => { e.preventDefault(); signOut(auth); };
        }
        if (welcomeMsg) welcomeMsg.innerText = `Welcome, ${user.email}`;
      } else {
        if (loginLink) {
          loginLink.innerText = 'Login';
          loginLink.href = 'login.html';
          loginLink.onclick = null;
        }
        if (welcomeMsg) welcomeMsg.innerText = '';
      }
    });
  </script>
</body>
